# Hermes — Python + ML-agent toolchain.
# Pairs with AgentImageCatalog.entry(id: "hermes") once the built
# tarball is published to a GitHub Release.
apiVersion: lumina.dev/v1alpha1
kind: AgentImage
metadata:
  name: hermes
  displayName: "Hermes — ML-agent runtime"
  tags: [agent, ml, python]

from: default

# Size target: ~400MB. Python + common agent deps, no CUDA (not usable
# in Linux ARM64 guest anyway); agents hit remote inference APIs.
packages:
  - python3
  - py3-pip
  - py3-numpy
  - py3-yaml
  - py3-requests
  - py3-cryptography
  - git
  - curl
  - jq

run:
  # pip into a shared venv so agents inherit the tooling without
  # per-invocation pip install latency.
  - python3 -m venv /opt/venv
  - /opt/venv/bin/pip install --no-cache-dir anthropic openai tiktoken
  - /opt/venv/bin/python -c "import anthropic, openai, tiktoken; print('hermes ok')"
  # Make /opt/venv/bin take precedence for exec so users don't need
  # to activate the venv.
  - echo 'export PATH=/opt/venv/bin:$PATH' >> /etc/profile

rosetta: false
