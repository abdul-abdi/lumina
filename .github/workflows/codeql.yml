name: CodeQL

# Static security analysis for the guest agent (Go).
#
# Swift was previously in the matrix but consistently failed under
# the CodeQL tracer — Apple framework symbols (VZMac*,
# VZLinuxRosettaDirectoryShare) don't resolve inside the wrapped
# build, and both autobuild and explicit `swift build` hit the same
# issue. Swift CodeQL coverage is also thin for systems code
# touching Virtualization.framework. The guest agent, which handles
# network + syscall logic, is where the real attack surface lives
# and where CodeQL's Go rules actually bite.
#
# Runs on PR, main, and a weekly schedule so drift in upstream
# databases surfaces even during quiet weeks. Findings are visible
# in the Security tab and should be triaged, not auto-gated —
# false positives in systems code are common.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Tuesdays 08:00 UTC — out of band from drift.yml (Sundays) so
    # a red week doesn't dogpile.
    - cron: '0 8 * * 2'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            os: ubuntu-latest
            build-path: Guest/lumina-agent
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use `security-extended` — includes rules that catch subtle
          # issues beyond the default set. Worth the extra runtime for
          # a systems codebase touching virtualization APIs.
          queries: security-extended

      - name: Build guest agent (Go)
        if: matrix.language == 'go'
        run: |
          cd Guest/lumina-agent
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
