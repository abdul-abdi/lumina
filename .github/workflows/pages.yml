name: Deploy lumina.run to GitHub Pages

# Publishes web/lumina.run/ to GitHub Pages. Once the lumina.run domain
# is registered, add a CNAME in the Pages settings and the same assets
# serve under the real domain.
#
# Default URL: https://abdul-abdi.github.io/lumina/
# With CNAME:  https://lumina.run/

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/lumina.run

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
