name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Smoke Test
    runs-on: macos-15  # Apple Silicon runner with Swift 6
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Codesign with entitlements
        run: |
          BIN_PATH=$(swift build --show-bin-path)/lumina
          codesign --entitlements lumina.entitlements --force -s - "$BIN_PATH"

      - name: Smoke test (--help)
        run: |
          BIN_PATH=$(swift build --show-bin-path)/lumina
          "$BIN_PATH" --help

  test:
    name: Unit Tests
    runs-on: macos-15
    permissions:
      contents: read
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run all unit tests
        run: swift test
