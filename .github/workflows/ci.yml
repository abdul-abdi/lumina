name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build & codesign
        run: |
          swift build
          BIN_PATH=$(swift build --show-bin-path)/lumina
          codesign --entitlements lumina.entitlements --force -s - "$BIN_PATH"
          "$BIN_PATH" --help

      - name: Run unit tests
        run: swift test

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: Guest/lumina-agent/go.sum

      - name: Verify guest agent compiles
        run: |
          cd Guest/lumina-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o /dev/null .
          echo "Guest agent: OK"

      # Agent-boot regression gate — v0.7.0 discipline.
      #
      # Desktop-stack changes (graphics, input devices, new boot loaders)
      # must NOT regress the agent path. This job boots a real VM via the
      # v0.6.0 image and asserts median cold-boot duration stays under the
      # threshold. Change the threshold only after a deliberate decision,
      # recorded in ROADMAP.md.
      #
      # Baseline (M3 Pro local, release build): ~390ms P50, ~470ms P95.
      # CI runners are ~2–3× slower; threshold set conservatively.
      #
      # Runner caveat: standard GitHub-hosted macOS runners are themselves
      # VMs and can't nest Virtualization.framework. The probe below
      # detects that and exits the step successfully with a notice — the
      # gate remains authoritative on self-hosted / larger runners and on
      # local dev. Nothing we ship depends on the gate running in default
      # CI; this is performance regression hygiene, not correctness.
      - name: Agent-boot regression gate
        env:
          AGENT_BOOT_P50_MAX_MS: "2000"
        run: |
          set -euo pipefail
          echo "Downloading v0.6.0 default image..."
          curl -fsSL -o /tmp/lumina-image.tar.gz \
            https://github.com/abdul-abdi/lumina/releases/download/lumina-v0.6.0/lumina-image-default.tar.gz
          mkdir -p "$HOME/.lumina/images/default"
          tar xzf /tmp/lumina-image.tar.gz -C "$HOME/.lumina/images/default"

          BIN="$(swift build --show-bin-path)/lumina"

          # Two-probe capability check. GitHub-hosted macos-15 runners are
          # VMs themselves — some variants can nest Virtualization.framework
          # enough for a single boot but fail on the second (APFS-clone
          # cleanup or VZ resource limits). Probing twice catches both
          # "no VZ at all" and "VZ works once" so we skip with an honest
          # diagnostic instead of silently ignoring a flaky measurement.
          # The gate runs normally when both probes succeed — i.e. on
          # self-hosted, larger-runner, and local dev.

          run_once() {
            # Returns the output on stdout; non-zero exit if lumina failed.
            "$BIN" run "true" 2>&1
          }

          # Extract duration_ms ONLY when the envelope shows a successful
          # boot + command. lumina's unified output shape always includes
          # `duration_ms` — even for error responses (timeout, vm_crashed,
          # connection_failed) — so a naive .duration_ms check accepts
          # errored runs and reports impossibly-small measurements. The
          # authoritative signal is `error == null && exit_code == 0`.
          extract_success_ms() {
            printf '%s' "$1" | jq -r '
              select((.error // null) == null and (.exit_code // -1) == 0)
              | .duration_ms // empty
            ' 2>/dev/null || true
          }

          echo "Probe 1/2: verify runner can boot a VM successfully..."
          PROBE1_OUT="$(run_once || true)"
          PROBE1_MS="$(extract_success_ms "$PROBE1_OUT")"
          if [ -z "$PROBE1_MS" ]; then
            echo "::notice::Agent-boot gate skipped: Virtualization unavailable on this runner (no successful boot envelope)."
            echo "Probe 1 output (truncated):"
            printf '%s\n' "$PROBE1_OUT" | head -20
            exit 0
          fi
          echo "  probe 1: ${PROBE1_MS}ms — VZ available."

          echo "Probe 2/2: verify runner can sustain consecutive boots..."
          PROBE2_OUT="$(run_once || true)"
          PROBE2_MS="$(extract_success_ms "$PROBE2_OUT")"
          if [ -z "$PROBE2_MS" ]; then
            echo "::notice::Agent-boot gate skipped: runner booted once but failed the second boot (clone cleanup or VZ resource limit)."
            echo "Probe 2 output (truncated):"
            printf '%s\n' "$PROBE2_OUT" | head -20
            exit 0
          fi
          echo "  probe 2: ${PROBE2_MS}ms — runner can sustain consecutive boots."

          echo "Measuring cold-boot duration over 5 iterations..."
          MEASUREMENTS=()
          for i in 1 2 3 4 5; do
            OUT="$(run_once || true)"
            MS="$(extract_success_ms "$OUT")"
            if [ -z "$MS" ]; then
              echo "::error::Iteration $i failed to produce a successful boot envelope."
              echo "Iteration output (truncated):"
              printf '%s\n' "$OUT" | head -20
              exit 1
            fi
            echo "  iter $i: ${MS}ms"
            MEASUREMENTS+=("$MS")
          done

          # Median of 5 = 3rd-smallest.
          MEDIAN=$(printf '%s\n' "${MEASUREMENTS[@]}" | sort -n | sed -n '3p')
          echo ""
          echo "Agent boot P50: ${MEDIAN}ms (max allowed: ${AGENT_BOOT_P50_MAX_MS}ms)"

          if [ "$MEDIAN" -gt "$AGENT_BOOT_P50_MAX_MS" ]; then
            echo "::error::Agent-boot regression: median ${MEDIAN}ms exceeds ${AGENT_BOOT_P50_MAX_MS}ms threshold."
            echo "::error::If intentional, update AGENT_BOOT_P50_MAX_MS in .github/workflows/ci.yml and document in ROADMAP.md."
            exit 1
          fi
          echo "::notice::Agent-boot gate passed (${MEDIAN}ms / ${AGENT_BOOT_P50_MAX_MS}ms budget)."
