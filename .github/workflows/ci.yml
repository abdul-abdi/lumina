name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build & codesign
        run: |
          swift build
          BIN_PATH=$(swift build --show-bin-path)/lumina
          codesign --entitlements lumina.entitlements --force -s - "$BIN_PATH"
          "$BIN_PATH" --help

      - name: Run unit tests
        run: swift test

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: Guest/lumina-agent/go.sum

      - name: Verify guest agent compiles
        run: |
          cd Guest/lumina-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o /dev/null .
          echo "Guest agent: OK"
