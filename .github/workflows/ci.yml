name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15  # Apple Silicon runner with Swift 6
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Unit Tests
        run: swift test --filter "TypesTests|ProtocolTests|DiskCloneTests|ImageStoreTests|SerialConsoleTests"
