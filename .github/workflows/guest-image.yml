name: Guest Image

# Builds the baked Linux ARM64 VM image (custom kernel + rootfs + agent).
# Runs on:
#   - manual dispatch (workflow_dispatch) for ad-hoc verification
#   - any PR/push that touches guest bits, so breakage is caught at
#     review time rather than at release tag time
#
# The output artifact is uploaded on every run; `release.yml` has its
# own copy of this logic for tag-driven releases. We duplicate rather
# than extract-to-reusable because the release path needs specific
# naming conventions that drift from the CI path.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Guest/**'
      - '.github/workflows/guest-image.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Guest/**'
      - '.github/workflows/guest-image.yml'

concurrency:
  group: guest-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-image:
    name: Build baked image
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: Guest/lumina-agent/go.sum

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs build-essential flex bison bc \
            libelf-dev libssl-dev curl xz-utils cpio

      - name: Build guest agent
        run: |
          cd Guest/lumina-agent
          go vet ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .
          file lumina-agent

      - name: Build custom kernel (CONFIG_MODULES=n)
        run: bash Guest/build-kernel.sh /tmp/lumina-kernel/vmlinuz

      - name: Build VM image (baked)
        run: LUMINA_KERNEL=/tmp/lumina-kernel/vmlinuz bash Guest/build-image.sh /tmp/lumina-image

      - name: Package + digest
        run: |
          cd /tmp/lumina-image
          chmod 644 vmlinuz rootfs.img
          FILES=(vmlinuz rootfs.img)
          [ -f initrd ] && chmod 644 initrd && FILES+=(initrd)
          [ -f lumina-agent ] && chmod 755 lumina-agent && FILES+=(lumina-agent)
          [ -d modules ] && chmod 644 modules/* && FILES+=(modules/)
          ls -lhR
          tar czf /tmp/lumina-image-default.tar.gz "${FILES[@]}"
          echo ""
          echo "--- Package ---"
          ls -lh /tmp/lumina-image-default.tar.gz
          echo "--- SHA256 ---"
          sha256sum /tmp/lumina-image-default.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz
          retention-days: 14
