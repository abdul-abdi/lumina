name: Release

on:
  push:
    tags:
      - "lumina-v*"

permissions:
  contents: write

jobs:
  # ── Job 1: Build Swift CLI binary (requires macOS) ──────────
  #
  # Unit tests are NOT re-run here. The tag must already point at a
  # commit that passed CI (`ci.yml` runs on every push to main and
  # on every PR), which covers build + tests + agent-boot gate. This
  # job only produces the release artifact; the pass signal is
  # upstream in CI.
  build-cli:
    name: Build CLI (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: spm-release-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-release-${{ runner.os }}-

      - name: Build release binary
        run: swift build -c release

      - name: Codesign with entitlements
        run: |
          BIN_PATH=$(swift build -c release --show-bin-path)/lumina
          codesign --entitlements lumina.entitlements --force -s - "$BIN_PATH"
          cp "$BIN_PATH" lumina

      - name: Smoke test
        run: ./lumina --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-cli
          path: lumina

  # ── Job 2: Build VM image (requires Linux ARM) ──────────────
  build-image:
    name: Build VM Image (Linux ARM)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: Guest/lumina-agent/go.sum

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs build-essential flex bison bc \
            libelf-dev libssl-dev curl xz-utils cpio

      - name: Vet & build guest agent
        run: |
          cd Guest/lumina-agent
          go vet ./...
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .

      - name: Build custom kernel (CONFIG_MODULES=n)
        run: bash Guest/build-kernel.sh /tmp/lumina-kernel/vmlinuz

      - name: Build VM image (baked)
        run: LUMINA_KERNEL=/tmp/lumina-kernel/vmlinuz bash Guest/build-image.sh /tmp/lumina-image

      - name: Package image
        run: |
          cd /tmp/lumina-image
          chmod 644 vmlinuz rootfs.img
          # Baked images: only vmlinuz + rootfs.img
          # Legacy images: also include initrd, lumina-agent, modules/
          FILES=(vmlinuz rootfs.img)
          [ -f initrd ] && chmod 644 initrd && FILES+=(initrd)
          [ -f lumina-agent ] && chmod 755 lumina-agent && FILES+=(lumina-agent)
          [ -d modules ] && chmod 644 modules/* && FILES+=(modules/)
          tar czf /tmp/lumina-image-default.tar.gz "${FILES[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz

  # ── Job 3: Create release with structured notes ─────────────
  publish:
    name: Publish Release
    needs: [build-cli, build-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: lumina-cli
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: lumina-image-default
          path: artifacts/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#lumina-v}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep "^lumina-v" | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits by category
          FEATS=""
          FIXES=""
          PERF=""
          CHORE=""
          OTHER=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            ENTRY="- ${MSG} (\`${HASH}\`)"

            case "$MSG" in
              feat:*|feat\(*) FEATS="${FEATS}${ENTRY}"$'\n' ;;
              fix:*|fix\(*)   FIXES="${FIXES}${ENTRY}"$'\n' ;;
              perf:*|perf\(*) PERF="${PERF}${ENTRY}"$'\n' ;;
              chore:*|ci:*|docs:*|test:*|refactor:*) CHORE="${CHORE}${ENTRY}"$'\n' ;;
              *)              OTHER="${OTHER}${ENTRY}"$'\n' ;;
            esac
          done < <(git log --oneline "$RANGE" 2>/dev/null)

          # Generate checksums
          CLI_SHA=$(sha256sum artifacts/lumina | cut -d' ' -f1)
          IMG_SHA=$(sha256sum artifacts/lumina-image-default.tar.gz | cut -d' ' -f1)
          CLI_SIZE=$(du -h artifacts/lumina | cut -f1 | tr -d ' ')
          IMG_SIZE=$(du -h artifacts/lumina-image-default.tar.gz | cut -f1 | tr -d ' ')

          # Build release body
          cat > /tmp/release-body.md << BODY_EOF
          ## What's New

          BODY_EOF

          [ -n "$FEATS" ] && printf '### Features\n%s\n' "$FEATS" >> /tmp/release-body.md
          [ -n "$FIXES" ] && printf '### Bug Fixes\n%s\n' "$FIXES" >> /tmp/release-body.md
          [ -n "$PERF" ]  && printf '### Performance\n%s\n' "$PERF" >> /tmp/release-body.md
          [ -n "$CHORE" ] && printf '### Maintenance\n%s\n' "$CHORE" >> /tmp/release-body.md
          [ -n "$OTHER" ] && printf '### Other\n%s\n' "$OTHER" >> /tmp/release-body.md

          cat >> /tmp/release-body.md << BODY_EOF

          ## Install

          \`\`\`bash
          # Download and install the CLI
          curl -fsSL https://github.com/abdul-abdi/lumina/releases/download/${TAG}/lumina -o lumina
          chmod +x lumina
          sudo mv lumina /usr/local/bin/

          # Download the default VM image
          curl -fsSL https://github.com/abdul-abdi/lumina/releases/download/${TAG}/lumina-image-default.tar.gz -o lumina-image.tar.gz
          mkdir -p ~/.lumina/images/default
          tar xzf lumina-image.tar.gz -C ~/.lumina/images/default
          rm lumina-image.tar.gz

          # Verify
          lumina run "echo hello from lumina v${VERSION}"
          \`\`\`

          Or add as a Swift package dependency:
          \`\`\`swift
          .package(url: "https://github.com/abdul-abdi/lumina.git", from: "${VERSION}")
          \`\`\`

          ## Artifacts

          | File | Size | SHA-256 |
          |------|------|---------|
          | \`lumina\` (macOS arm64 CLI) | ${CLI_SIZE} | \`${CLI_SHA}\` |
          | \`lumina-image-default.tar.gz\` (Alpine VM image) | ${IMG_SIZE} | \`${IMG_SHA}\` |

          ## Requirements

          - macOS 14+ on Apple Silicon
          - No external dependencies (library), swift-argument-parser (CLI only)

          ---
          **Full Changelog**: https://github.com/abdul-abdi/lumina/compare/${PREV_TAG}...${TAG}
          BODY_EOF

          # Extract a human-readable title from the first feat commit, or use version
          TITLE_HINT=$(echo "$FEATS" | head -1 | sed 's/^- feat: //' | sed 's/ (`.*$//' | head -c 60)
          if [ -n "$TITLE_HINT" ]; then
            TITLE="Lumina v${VERSION} — ${TITLE_HINT}"
          else
            TITLE="Lumina v${VERSION}"
          fi

          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ steps.notes.outputs.title }}" \
            --notes-file /tmp/release-body.md \
            --latest \
            artifacts/lumina \
            artifacts/lumina-image-default.tar.gz
