name: Release

on:
  push:
    tags:
      - "lumina-v*"

permissions:
  contents: write

jobs:
  # ── Job 1: Build Swift CLI binary (requires macOS) ──────────
  build-cli:
    name: Build CLI (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Codesign with entitlements
        run: |
          BIN_PATH=$(swift build -c release --show-bin-path)/lumina
          codesign --entitlements lumina.entitlements --force -s - "$BIN_PATH"
          cp "$BIN_PATH" lumina

      - name: Smoke test
        run: ./lumina --help

      - name: Run unit tests
        run: swift test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-cli
          path: lumina

  # ── Job 2: Build VM image (requires Linux ARM) ──────────────
  build-image:
    name: Build VM Image (Linux ARM)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: Guest/lumina-agent/go.sum

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Build guest agent
        run: |
          cd Guest/lumina-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .

      - name: Build VM image
        run: sudo bash Guest/build-image.sh /tmp/lumina-image

      - name: Package image
        run: |
          cd /tmp/lumina-image
          sudo chmod 644 vmlinuz initrd rootfs.img
          [ -f lumina-agent ] && sudo chmod 755 lumina-agent
          [ -d modules ] && sudo chmod 644 modules/*
          tar czf /tmp/lumina-image-default.tar.gz vmlinuz initrd rootfs.img \
            $([ -f lumina-agent ] && echo lumina-agent) \
            $([ -d modules ] && echo modules/)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz

  # ── Job 3: Create release (waits for both builds) ───────────
  publish:
    name: Publish Release
    needs: [build-cli, build-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: lumina-cli
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: lumina-image-default
          path: artifacts/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            artifacts/lumina \
            artifacts/lumina-image-default.tar.gz
