name: Build VM Image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm  # ARM64 runner — matches Apple Silicon guest architecture
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Build guest agent
        run: |
          cd Guest/lumina-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .
          file lumina-agent

      - name: Build VM image
        run: sudo bash Guest/build-image.sh /tmp/lumina-image

      - name: Package image
        run: |
          cd /tmp/lumina-image
          sudo chmod 644 vmlinuz initrd rootfs.img
          [ -f lumina-agent ] && sudo chmod 755 lumina-agent
          [ -d modules ] && sudo chmod 644 modules/*
          ls -lhR
          tar czf /tmp/lumina-image-default.tar.gz vmlinuz initrd rootfs.img \
            $([ -f lumina-agent ] && echo lumina-agent) \
            $([ -d modules ] && echo modules/)
          echo "--- Package ---"
          ls -lh /tmp/lumina-image-default.tar.gz
          echo "--- SHA256 ---"
          sha256sum /tmp/lumina-image-default.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz

