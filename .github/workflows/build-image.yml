name: Build VM Image

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm  # ARM64 runner — matches Apple Silicon guest architecture
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y e2fsprogs build-essential flex bison bc \
            libelf-dev libssl-dev curl xz-utils cpio

      - name: Build guest agent
        run: |
          cd Guest/lumina-agent
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .
          file lumina-agent

      - name: Build custom kernel (CONFIG_MODULES=n)
        run: bash Guest/build-kernel.sh /tmp/lumina-kernel/vmlinuz

      - name: Build VM image (baked)
        run: LUMINA_KERNEL=/tmp/lumina-kernel/vmlinuz bash Guest/build-image.sh /tmp/lumina-image

      - name: Package image
        run: |
          cd /tmp/lumina-image
          chmod 644 vmlinuz rootfs.img
          FILES="vmlinuz rootfs.img"
          [ -f initrd ] && chmod 644 initrd && FILES="$FILES initrd"
          [ -f lumina-agent ] && chmod 755 lumina-agent && FILES="$FILES lumina-agent"
          [ -d modules ] && chmod 644 modules/* && FILES="$FILES modules/"
          ls -lhR
          tar czf /tmp/lumina-image-default.tar.gz $FILES
          echo "--- Package ---"
          ls -lh /tmp/lumina-image-default.tar.gz
          echo "--- SHA256 ---"
          sha256sum /tmp/lumina-image-default.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz

