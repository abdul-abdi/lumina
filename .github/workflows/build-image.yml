name: Build VM Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'image-v*'

permissions:
  contents: write

jobs:
  build-image:
    runs-on: ubuntu-24.04-arm  # ARM64 runner — matches Apple Silicon guest architecture
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y e2fsprogs

      - name: Build guest agent
        run: |
          cd Guest/lumina-agent
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .
          file lumina-agent

      - name: Build VM image
        run: sudo bash Guest/build-image.sh /tmp/lumina-image

      - name: Package image
        run: |
          cd /tmp/lumina-image
          ls -lh
          tar czf /tmp/lumina-image-default.tar.gz vmlinuz initrd rootfs.img
          echo "--- Package ---"
          ls -lh /tmp/lumina-image-default.tar.gz
          echo "--- SHA256 ---"
          sha256sum /tmp/lumina-image-default.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/image-v')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/lumina-image-default.tar.gz
          body: |
            ## Lumina VM Image (default)

            Alpine Linux aarch64 base image for Lumina VMs.

            **Install:** `lumina pull` or download manually and extract to `~/.lumina/images/default/`

            **Contents:** vmlinuz, initrd, rootfs.img (Alpine 3.20 + lumina-agent + python3, git, curl)
