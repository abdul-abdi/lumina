name: Build VM Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'image-v*'

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build guest agent
        run: |
          cd Guest/lumina-agent
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o lumina-agent .
          file lumina-agent

      - name: Build VM image
        run: sudo bash Guest/build-image.sh /tmp/lumina-image

      - name: Package image
        run: |
          cd /tmp/lumina-image
          tar czf /tmp/lumina-image-default.tar.gz vmlinuz initrd rootfs.img
          ls -lh /tmp/lumina-image-default.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-image-default
          path: /tmp/lumina-image-default.tar.gz

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/image-v')
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/lumina-image-default.tar.gz
